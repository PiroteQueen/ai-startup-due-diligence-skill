name: validate-skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pyyaml
      - run: python scripts/validate_skill.py
      - run: for scenario in tests/fixtures/*/; do python scripts/validate_test_run.py "$scenario"; done
      - run: python -m unittest tests/test_validator_negative_cases.py
